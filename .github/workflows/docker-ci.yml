name: docker-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This CI is independent of engine.yml (offline Python data refresh).
jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ---- Frontend: install (clean), test, build ----
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Frontend build (Vite)
        working-directory: frontend
        run: npm run build

      # ---- Build and boot the REAL production image ----
      - name: Build Docker image
        run: docker build -t prp-web:ci .

      - name: Run container
        run: |
          docker run -d --name prp-web -p 3001:3001 \
            -e NODE_ENV=production -e PORT=3001 \
            prp-web:ci

      # Poll the container's own HEALTHCHECK until it reports healthy.
      - name: Wait for container health
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' prp-web 2>/dev/null || echo "starting")
            echo "attempt $i: health=$status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            if [ "$status" = "unhealthy" ]; then break; fi
            sleep 3
          done
          echo "container did not become healthy:"
          docker logs prp-web || true
          exit 1

      - name: Assert /api/health returns 200
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api/health)
          echo "/api/health -> $code"
          test "$code" = "200"

      - name: Assert SPA root returns 200
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/)
          echo "/ -> $code"
          test "$code" = "200"

      - name: Container logs (always)
        if: always()
        run: docker logs prp-web || true

      - name: Tear down
        if: always()
        run: docker rm -f prp-web || true
