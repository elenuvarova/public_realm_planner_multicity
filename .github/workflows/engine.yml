name: Refresh engine data

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'City (paris | antwerp | london) — ignored when run_all is true'
        default: paris
        required: false
      asset:
        description: 'Asset type: toilets | benches | waste_bins | drinking_water | fitness_stations | bike_parking | defibrillators | dog_areas'
        default: toilets
        required: false
      run_all:
        description: 'Run all city/asset combinations'
        type: boolean
        default: false
      solver:
        description: 'Optimiser: greedy (fast) or mclp (exact ILP)'
        default: greedy
        required: false
  schedule:
    - cron: '0 4 1 * *'   # 04:00 UTC on the 1st of every month

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache OSMnx HTTP responses + walk graph files between runs
      - name: Restore OSM + graph cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: osm-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            osm-cache-${{ runner.os }}-

      # Scheduled runs and manual "run_all" → regenerate every city
      - name: Run engine — all cities
        if: github.event_name == 'schedule' || github.event.inputs.run_all == 'true'
        run: |
          python -m engine.run --all \
            --solver "${{ github.event.inputs.solver || 'greedy' }}"

      # Manual single-city run
      - name: Run engine — single city
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_all != 'true'
        run: |
          python -m engine.run \
            --city "${{ github.event.inputs.city }}" \
            --asset "${{ github.event.inputs.asset }}" \
            --solver "${{ github.event.inputs.solver || 'greedy' }}"

      - name: Commit refreshed data
        run: |
          git config user.name  "engine-bot"
          git config user.email "engine-bot@users.noreply.github.com"
          git add frontend/public/data/
          git diff --staged --quiet || (
            git commit -m "data: refresh $(date -u +%Y-%m-%d) [skip ci]" && git push
          )
