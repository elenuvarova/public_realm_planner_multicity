# Database is an EXTERNAL free-tier Postgres (e.g. Neon or Supabase), not a
# Render-managed one — so Render's "one active free database" limit never
# applies. Set DATABASE_URL in the Render dashboard; sync: false keeps the
# connection string (with its password) out of git.
services:
  - type: web
    name: public-realm-planner-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
